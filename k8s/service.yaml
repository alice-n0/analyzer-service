# analyzer-service ClusterIP (클러스터 내부에서 http://analyzer-service.<ns>.svc.cluster.local:8080)
apiVersion: v1
kind: Service
metadata:
  name: analyzer-service
  labels:
    app: analyzer-service
spec:
  type: ClusterIP
  selector:
    app: analyzer-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
