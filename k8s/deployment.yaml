# analyzer-service 애플리케이션 Deployment
# 필요 시 네임스페이스: kubectl apply -f k8s/ -n <your-namespace>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer-service
  labels:
    app: analyzer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer-service
  template:
    metadata:
      labels:
        app: analyzer-service
    spec:
      containers:
        - name: analyzer-service
          # 빌드·레지스트리에 맞게 이미지를 교체하세요.
          image: analyzer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki-read.logging.svc.cluster.local:3100"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: OPENAI_API_KEY
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_PASSWORD
            - name: GRAFANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_API_KEY

          # spring-boot-starter-actuator 미사용: TCP 기준
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
